<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/icon/logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="CUCEK UP-TO-DATE">
  <link rel="apple-touch-icon" href="/icon/logo.png">
  <meta name="theme-color" content="#2196f3">
  <title>CUCEK UP-TO-DATE</title>
  <link rel="manifest" href="/manifest.json">
  <style>
    /* Prevent white flash during initial React hydration */
    html,
    body {
      background-color: #050505;
      margin: 0;
      padding: 0;
    }

    @keyframes pulse-preloader {
      0% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.1);
      }

      100% {
        transform: scale(1);
      }
    }
  </style>
</head>

<body data-color-scheme="dark">
  <div id="preloader"
    style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #ffffff; z-index: 99999; display: flex; justify-content: center; align-items: center; transition: opacity 0.75s, visibility 0.75s;">
    <img src="/icon/preloader1.png" alt="preloader-logo"
      style="width: 350px; max-width: 80vw; height: auto; margin: auto; object-fit: contain; animation: pulse-preloader 1.5s infinite;">
  </div>

  <!-- Scroll Progress injected via React or CSS via index.html -->
  <div class="scroll-progress" id="scrollProgress"></div>

  <div id="root"></div>

  <script type="module" src="/src/main.jsx"></script>

  <!-- Preloader Logic -->
  <script>
    window.addEventListener("load", function () {
      const preloader = document.getElementById("preloader");
      setTimeout(() => {
        if (preloader) {
          preloader.style.opacity = "0";
          setTimeout(() => {
            preloader.style.display = "none";
          }, 750);
        }
      }, 300); // Small delay to let React mount safely
    });
  </script>
</body>

</html>
